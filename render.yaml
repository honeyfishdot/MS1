# Render Blueprint — AllBright
# Two web services (Rust backend + React dashboard) plus Redis and Postgres.
# The dashboard proxies /api/* to the backend using RUST_BACKEND_URL.

services:
  # ============================================================================
  # Rust Backend Service (HTTP API + gRPC)
  # Binds to Render's $PORT automatically (main.rs prefers PORT env var).
  # /healthz and /readyz are exempt from the API key middleware.
  # ============================================================================
  - type: web
    name: allbright-backend
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: RUST_LOG
        value: info
      - key: PILOT_MODE
        value: "true"
      # Shared secret between dashboard and backend. Generated once by Render,
      # then referenced by the dashboard service below so both always match.
      - key: API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: allbright-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: allbright-redis
          type: redis
          property: connectionString
      # Secrets — set these in the Render dashboard (sync:false keeps them out of git)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PIMLICO_API_KEY
        sync: false
      - key: PRIVATE_KEY
        sync: false

  # ============================================================================
  # React Dashboard Service (Express server proxies /api to the backend)
  # Dockerfile lives at repo root; build context is the repo root.
  # ============================================================================
  - type: web
    name: allbright-dashboard
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Full URL (scheme + host) is required by server.ts `new URL(path, BACKEND_URL)`.
      - key: RUST_BACKEND_URL
        fromService:
          type: web
          name: allbright-backend
          property: hostport
      # Must equal the backend's API_KEY so x-api-key validation passes.
      - key: RUST_API_KEY
        fromService:
          type: web
          name: allbright-backend
          envVarKey: API_KEY

  # ============================================================================
  # Redis Cache Service
  # ============================================================================
  - type: redis
    name: allbright-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# ============================================================================
# PostgreSQL Database (Render managed)
# ============================================================================
databases:
  - name: allbright-db
    plan: starter
    region: oregon
    databaseName: allbright
    user: apxuser
